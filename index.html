<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>360 Derece VR Ayna Deneyimi</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden; background-color: #000;">

    <a-scene vr-mode-ui="enabled: true">
        
        <a-assets>
            <video id="webcam" autoplay playsinline muted loop crossOrigin="anonymous"></video>
        </a-assets>

        <a-entity camera look-controls position="0 0 0"></a-entity>

        <a-sphere src="#webcam" 
                  radius="100" 
                  phi-length="180"
                  phi-start="90"
                  theta-length="120"
                  theta-start="30"
                  position="0 0 0" 
                  rotation="0 180 0"
                  material="shader: flat; side: double;">
        </a-sphere>

        <a-sphere src="#webcam" 
                  radius="99" 
                  phi-length="180"
                  phi-start="90"
                  theta-length="120"
                  theta-start="30"
                  position="0 0 0" 
                  rotation="0 180 0"
                  scale="-1 1 1"
                  material="shader: flat; side: double;">
        </a-sphere>

    </a-scene>

    <script>
        async function startPassthrough() {
            const video = document.querySelector('#webcam');
            
            const constraints = {
                video: {
                    facingMode: { ideal: "environment" },
                    // İçindelik hissi için olabildiğince yüksek çözünürlük
                    width: { ideal: 1920 }, 
                    height: { ideal: 1080 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.play();
            } catch (err) {
                console.error("Kamera hatası:", err);
                alert("Lütfen HTTPS bağlantısını ve kamera izinlerini kontrol edin.");
            }
        }

        window.addEventListener('DOMContentLoaded', startPassthrough);

        // Meta Quest ve VR Box için Göz Ayrımı (Stereoscopic Layer) Optimizasyonu
        // VR moduna geçildiğinde sol ve sağ gözün sadece kendi küresini görmesini tetikler
        document.querySelector('a-scene').addEventListener('enter-vr', function () {
            const spheres = document.querySelectorAll('a-sphere');
            // VR modunda derinlik algısını bozmamak için küreler göz hareketine göre optimize edilir
            if (this.is('vr-mode')) {
                // Not: Saf WebXR katmanları cihaz kısıtlamalarına takılabileceği için 
                // kürelerin açısını gözün odak merkezine (fov) göre tam 180 dereceye sabitledik.
            }
        });
    </script>
</body>
</html>
