<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kesin Çözümlü VR Passthrough</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* 2D Önizleme Ekranı */
        .preview-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5; /* A-frame sahnesinin önünde dursun */
        }

        .preview-screen {
            flex: 1;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .preview-screen video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .left-preview video {
            transform: scaleX(-1); /* Sol göz ayna görüntüsü */
        }

        .hidden {
            display: none !important;
        }

        /* Özelleştirilmiş Orijinal VR Başlat Butonu */
        .a-enter-vr {
            position: fixed !important;
            bottom: 40px !important;
            left: 50% !important;
            right: auto !important;
            transform: translateX(-50%) !important;
            width: 200px !important;
            height: 55px !important;
            background: linear-gradient(135deg, #00f2fe, #4facfe) !important;
            border-radius: 30px !important;
            box-shadow: 0 5px 25px rgba(79, 172, 254, 0.6) !important;
            border: none !important;
            z-index: 10 !important; /* Her şeyin önünde dursun */
        }

        .a-enter-vr-button {
            background-image: none !important;
            width: 100% !important;
            height: 100% !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }

        .a-enter-vr-button::after {
            content: "360° VR BAŞLAT" !important;
            color: #fff !important;
            font-family: sans-serif !important;
            font-size: 16px !important;
            font-weight: bold !important;
            letter-spacing: 1px !important;
        }
    </style>
</head>
<body>

    <div id="webPreview" class="preview-container">
        <div class="preview-screen left-preview">
            <video id="leftCam" autoplay playsinline muted></video>
        </div>
        <div class="preview-screen right-preview">
            <video id="rightCam" autoplay playsinline muted></video>
        </div>
    </div>

    <a-scene vr-mode-ui="enabled: true">
        <a-assets>
            <video id="vrWebcam" autoplay playsinline muted loop crossOrigin="anonymous"></video>
        </a-assets>

        <a-entity camera look-controls position="0 0 0"></a-entity>

        <a-sphere src="#vrWebcam" 
                  radius="100" 
                  position="0 0 0" 
                  rotation="0 180 0"
                  material="shader: flat; side: double;">
        </a-sphere>

        <a-sphere src="#vrWebcam" 
                  radius="99" 
                  position="0 0 0" 
                  rotation="0 180 0"
                  scale="-1 1 1"
                  material="shader: flat; side: double;">
        </a-sphere>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
        const vrWebcam = document.getElementById('vrWebcam');
        const leftCam = document.getElementById('leftCam');
        const rightCam = document.getElementById('rightCam');

        // Tarayıcıdan tek bir kamera akışı isteyip tüm ekranlara dağıtan fonksiyon
        async function startCamera() {
            const constraints = {
                video: {
                    facingMode: { ideal: "environment" }, // Arka/Dış kamera
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                // Tek bir kamera akışını 3 farklı video elementine paylaştırıyoruz
                vrWebcam.srcObject = stream;
                leftCam.srcObject = stream;
                rightCam.srcObject = stream;

                // Videoların oynatıldığından emin olalım
                vrWebcam.play();
                leftCam.play();
                rightCam.play();

            } catch (err) {
                console.error("Kamera erişim hatası detayları:", err);
                alert("Kameraya erişilemedi. Lütfen adresteki 'https://' ibaresini ve tarayıcı izinlerini kontrol edin.");
            }
        }

        // VR Moduna girildiğinde düz önizlemeyi gizle
        sceneEl.addEventListener('enter-vr', function () {
            document.getElementById('webPreview').classList.add('hidden');
        });

        // VR Modundan çıkıldığında düz önizlemeyi geri aç
        sceneEl.addEventListener('exit-vr', function () {
            document.getElementById('webPreview').classList.remove('hidden');
        });

        // Sayfa yüklenir yüklenmez kamerayı tetikle
        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
