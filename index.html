<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gerçek VR Passthrough Ayna Deneyimi</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden; background-color: #000;">

    <a-scene vr-mode-ui="enabled: true">
        
        <a-assets>
            <video id="webcam" autoplay playsinline muted loop crossOrigin="anonymous"></video>
        </a-assets>

        <a-entity camera look-controls position="0 1.6 0"></a-entity>

        <a-video src="#webcam" 
                 position="1.5 1.6 -3" 
                 width="2.8" 
                 height="2.1">
        </a-video>

        <a-video src="#webcam" 
                 position="-1.5 1.6 -3" 
                 width="2.8" 
                 height="2.1" 
                 scale="-1 1 1">
        </a-video>

    </a-scene>

    <script>
        // Cihazın gerçek dış kamerasını başlatma fonksiyonu
        async function startPassthrough() {
            const video = document.querySelector('#webcam');
            
            const constraints = {
                video: {
                    facingMode: { ideal: "environment" }, // Arka/Dış kamera
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.play();
            } catch (err) {
                console.error("Kamera akışı başlatılamadı:", err);
                alert("Kameraya ulaşılamadı. Lütfen HTTPS bağlantısı kullandığınızdan emin olun.");
            }
        }

        // Sayfa yüklenir yüklenmez kamerayı arkada hazırla
        window.addEventListener('DOMContentLoaded', startPassthrough);
    </script>
</body>
</html>
