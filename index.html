<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gelişmiş VR Passthrough Ayna Deneyimi</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* İlk açılıştaki ikiye bölünmüş düz web önizlemesi */
        .preview-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .preview-screen {
            flex: 1;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .preview-screen video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Sol ekranın ayna simetrisi */
        .left-preview video {
            transform: scaleX(-1);
        }

        /* VR Moduna girildiğinde düz ekranı tamamen yok etmek için */
        .hidden {
            display: none !important;
        }

        /* A-FRAME'İN ORİJİNAL BUTONUNU ALT ORTAYA TAŞIMA VE ÖZELLEŞTİRME 
           Tarayıcıların engellemediği tek buton budur.
        */
        .a-enter-vr {
            position: fixed !important;
            bottom: 40px !important;
            left: 50% !important;
            right: auto !important;
            transform: translateX(-50%) !important;
            width: 180px !important;
            height: 50px !important;
            background: linear-gradient(135deg, #ff007f, #7f00ff) !important;
            border-radius: 25px !important;
            box-shadow: 0 5px 20px rgba(127, 0, 255, 0.5) !important;
            border: none !important;
            transition: all 0.3s ease !important;
        }

        /* Orijinal küçük gözlük ikonunu gizleyip yerine yazı yerleştiriyoruz */
        .a-enter-vr-button {
            background-image: none !important;
            width: 100% !important;
            height: 100% !important;
            content: "" !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }

        .a-enter-vr-button::after {
            content: "VR BAŞLAT" !important;
            color: #fff !important;
            font-family: sans-serif !important;
            font-size: 16px !important;
            font-weight: bold !important;
            letter-spacing: 1px !important;
        }
    </style>
</head>
<body>

    <div id="webPreview" class="preview-container">
        <div class="preview-screen left-preview">
            <video class="webcam-feed" autoplay playsinline muted></video>
        </div>
        <div class="preview-screen right-preview">
            <video class="webcam-feed" autoplay playsinline muted></video>
        </div>
    </div>

    <a-scene vr-mode-ui="enabled: true">
        <a-assets>
            <video id="vrWebcam" autoplay playsinline muted loop crossOrigin="anonymous"></video>
        </a-assets>

        <a-entity camera look-controls position="0 0 0"></a-entity>

        <a-sphere src="#vrWebcam" 
                  radius="100" 
                  phi-length="180"
                  phi-start="90"
                  theta-length="120"
                  theta-start="30"
                  position="0 0 0" 
                  rotation="0 180 0"
                  material="shader: flat; side: double;">
        </a-sphere>

        <a-sphere src="#vrWebcam" 
                  radius="99" 
                  phi-length="180"
                  phi-start="90"
                  theta-length="120"
                  theta-start="30"
                  position="0 0 0" 
                  rotation="0 180 0"
                  scale="-1 1 1"
                  material="shader: flat; side: double;">
        </a-sphere>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
        const vrWebcam = document.querySelector('#vrWebcam');
        const previewVideos = document.querySelectorAll('.webcam-feed');

        // Kamera akışını başlatma
        async function initAllCameras() {
            const constraints = {
                video: {
                    facingMode: { ideal: "environment" },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                vrWebcam.srcObject = stream;
                previewVideos.forEach(video => {
                    video.srcObject = stream;
                });
            } catch (err) {
                console.error("Kamera erişim hatası:", err);
                alert("Kameraya ulaşılamadı. Lütfen sitenin HTTPS olduğundan emin olun.");
            }
        }

        // VR Moduna geçiş sağlandığında düz ekranı tamamen kapat
        sceneEl.addEventListener('enter-vr', function () {
            document.getElementById('webPreview').classList.add('hidden');
        });

        // VR Modundan çıkıldığında düz ekranı geri aç
        sceneEl.addEventListener('exit-vr', function () {
            document.getElementById('webPreview').classList.remove('hidden');
        });

        window.addEventListener('DOMContentLoaded', initAllCameras);
    </script>
</body>
</html>
